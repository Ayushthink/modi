<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Modi Runner 🇮🇳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;900&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:'Baloo 2',cursive;
  background:#000;
  /* NO global touch-action:none — that breaks buttons */
  -webkit-user-select:none;user-select:none;
}

/* ── SCREENS ── */
.screen{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:clamp(6px,2vh,18px);
  text-align:center;padding:16px;
  /* screens need pointer events */
  pointer-events:all;
}
.screen.show{display:flex;}

/* ── TITLE ── */
#sTitle{background:radial-gradient(ellipse at 50% 40%,#fff8e1 0%,#ff6600 55%,#000080 100%);}
.t-flag {font-size:clamp(32px,8vw,64px);animation:wave 2s ease-in-out infinite;}
.t-hero {font-size:clamp(56px,17vw,120px);animation:bob 1.2s ease-in-out infinite;filter:drop-shadow(3px 5px 8px rgba(0,0,0,.4));}
.t-title{font-size:clamp(22px,7vw,58px);font-weight:900;color:#FF6600;text-shadow:3px 3px 0 #000080;line-height:1.05;}
.t-sub  {font-size:clamp(11px,3.2vw,19px);background:#fff;color:#000080;font-weight:700;border-radius:30px;padding:5px 18px;border:3px solid #FF6600;}
.t-hs   {font-size:clamp(11px,3vw,15px);background:#FFD700;color:#000080;font-weight:800;padding:4px 14px;border-radius:20px;display:none;}
.t-tip  {font-size:clamp(10px,2.4vw,13px);color:rgba(255,255,255,.85);font-style:italic;max-width:320px;line-height:1.6;}

/* ── CANVAS (behind everything, no pointer events) ── */
#gameCanvas{
  position:fixed;inset:0;
  display:none;
  touch-action:none;
  pointer-events:none;   /* canvas NEVER captures clicks */
  z-index:1;
}

/* ── INVISIBLE JUMP ZONE (over canvas, under HUD) ── */
#jumpZone{
  position:fixed;inset:0;
  display:none;
  z-index:2;
  cursor:pointer;
  touch-action:none;
}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:none;
  justify-content:space-between;align-items:center;
  padding:clamp(4px,1.2vw,9px) clamp(10px,3vw,22px);
  background:linear-gradient(90deg,#000080,#00004a);
  border-bottom:3px solid #FFD700;
  z-index:10;pointer-events:none;
}
.hi{color:#fff;font-size:clamp(12px,3.4vw,19px);font-weight:700;display:flex;align-items:center;gap:4px;}
.hi em{color:#FFD700;font-style:normal;}
.lf{font-size:clamp(15px,4vw,22px);transition:.3s;}
.lf.dead{opacity:.2;transform:scale(.6);}

/* ── MOBILE CONTROLS ── */
#ctrl{
  position:fixed;bottom:0;left:0;right:0;
  display:none;
  justify-content:space-around;align-items:center;
  padding:clamp(5px,1.8vw,11px) clamp(8px,2.5vw,18px);
  background:rgba(0,0,0,.38);
  z-index:10;
  gap:8px;
}
.mb{
  flex:1;max-width:82px;
  height:clamp(48px,10vw,68px);
  background:rgba(255,255,255,.2);
  border:2.5px solid rgba(255,255,255,.55);
  border-radius:50%;
  font-size:clamp(18px,5vw,28px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  /* CRITICAL: allow touch on these */
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.mb:active{background:rgba(255,255,255,.45);}

/* ── FLOATING UI ── */
.qb{
  position:fixed;top:clamp(52px,10vw,78px);left:50%;
  transform:translateX(-50%);
  background:#fff;border:3px solid #FF6600;border-radius:16px;
  padding:7px 16px;font-size:clamp(11px,3.2vw,16px);font-weight:700;color:#000080;
  max-width:min(82vw,340px);z-index:20;pointer-events:none;
  animation:qshow 2.8s ease forwards;white-space:nowrap;
}
@keyframes qshow{0%{opacity:0;transform:translateX(-50%) translateY(-14px)}20%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}

.fs{
  position:fixed;font-size:clamp(17px,4.5vw,24px);font-weight:900;
  text-shadow:2px 2px 0 #000080;pointer-events:none;
  z-index:20;animation:fup 1.1s ease forwards;
}
@keyframes fup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(1.4)}}

#pwf{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#FFD700,#FF6600);
  color:#fff;font-size:clamp(16px,4.5vw,26px);font-weight:900;
  padding:12px 26px;border-radius:16px;border:4px solid #fff;
  z-index:30;opacity:0;pointer-events:none;text-align:center;
  text-shadow:2px 2px 0 rgba(0,0,0,.3);white-space:pre-line;
}
@keyframes pwshow{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}

/* ── GAME OVER ── */
#sOver{background:radial-gradient(ellipse,rgba(0,0,0,.93) 0%,rgba(0,0,70,.97) 100%);}
.go-em{font-size:clamp(50px,14vw,95px);}
.go-title{font-size:clamp(28px,9vw,68px);font-weight:900;color:#FF6600;text-shadow:3px 3px 0 #FFD700;animation:shake .45s ease infinite;}
@keyframes shake{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
.go-sc{background:rgba(255,255,255,.1);border:3px solid #FFD700;border-radius:16px;padding:11px 28px;color:#fff;font-size:clamp(13px,3.8vw,19px);font-weight:600;}
.go-sc strong{color:#FFD700;font-size:clamp(24px,7vw,38px);}
.go-q{color:rgba(255,255,255,.8);font-size:clamp(11px,2.8vw,16px);font-style:italic;max-width:320px;line-height:1.5;}

/* ── BUTTON ── */
.btn{
  background:linear-gradient(135deg,#FF6600,#c0392b);
  color:#fff;border:3px solid #fff;
  padding:clamp(9px,2.2vw,15px) clamp(22px,5.5vw,42px);
  font-size:clamp(15px,4.2vw,21px);font-family:'Baloo 2',cursive;font-weight:900;
  border-radius:50px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  box-shadow:0 5px 16px rgba(255,100,0,.5);
  transition:transform .12s;
  animation:pulse 2s ease-in-out infinite;
  /* CRITICAL for mobile */
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  pointer-events:all;
}
.btn:hover,.btn:active{transform:scale(1.08) translateY(-2px);animation:none;}
.btn.sec{
  background:linear-gradient(135deg,#000080,#00003a);
  font-size:clamp(13px,3.2vw,17px);
  padding:clamp(7px,1.8vw,11px) clamp(18px,4.5vw,30px);
  animation:none;
}
@keyframes pulse{0%,100%{box-shadow:0 5px 16px rgba(255,100,0,.5),0 0 0 0 rgba(255,100,0,.4)}50%{box-shadow:0 5px 16px rgba(255,100,0,.5),0 0 0 14px rgba(255,100,0,0)}}
@keyframes wave{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}

.insta-link {
  display:inline-flex; align-items:center; gap:7px;
  background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  color:#fff; font-weight:800; text-decoration:none;
  font-size:clamp(13px,3.5vw,17px);
  padding:8px 20px; border-radius:30px;
  border:2.5px solid rgba(255,255,255,.6);
  box-shadow:0 4px 14px rgba(220,39,67,.45);
  transition:transform .15s, box-shadow .15s;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  letter-spacing:.5px;
}
.insta-link:hover, .insta-link:active {
  transform:scale(1.07) translateY(-2px);
  box-shadow:0 6px 20px rgba(220,39,67,.6);
}
</style>
</head>

/* ═══════════════════════════════════════
   AUDIO (Web Audio API)
═══════════════════════════════════════ */
let AC = null;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, type, dur, vol, sweep) {
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || 'sine';
    o.frequency.setValueAtTime(sweep || freq, c.currentTime);
    if (sweep) o.frequency.linearRampToValueAtTime(freq, c.currentTime + dur * .55);
    g.gain.setValueAtTime(vol || 0.28, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e) {}
}
function nois(dur, vol) {
  try {
    const c = ac(), sr = c.sampleRate;
    const b = c.createBuffer(1, sr*dur, sr), d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
    const s = c.createBufferSource(), g = c.createGain();
    s.buffer = b; s.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(vol||0.2, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur);
    s.start(); s.stop(c.currentTime+dur);
  } catch(e) {}
}
const SFX = {
  jump()    { tone(600,'sine',.17,.26,260); },
  pick()    { tone(880,'sine',.07,.2); setTimeout(()=>tone(1100,'sine',.07,.18),65); setTimeout(()=>tone(1320,'sine',.09,.14),130); },
  ouch()    { nois(.3,.28); tone(130,'sawtooth',.22,.25); },
  over()    { [440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',.18,.26),i*170)); },
  levelup() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.14,.22),i*80)); },
  tick()    { tone(200,'sine',.04,.03); }
};

const CV = document.getElementById('gameCanvas');

let W, H, GH, CSZ, OSZ, KSZ;

function resize() {
  W = CV.width  = window.innerWidth;
  H = CV.height = window.innerHeight;
  GH  = Math.round(H * (W < 500 ? .13 : .11));
  CSZ = Math.round(Math.min(W,H) * (W < 500 ? .12 : .08));
  OSZ = Math.round(CSZ * .95);
  KSZ = Math.round(CSZ * .72);
  if (running) pl.y = H - GH - CSZ;
}

let score=0, lives=3, level=1, running=false, raf=0, lastT=0;
let bgX=0, spaT=0, colT=0, quoT=0, tckT=0, spaI=2200;
let HS = parseInt(localStorage.getItem('modiHS4')||'0');

let obs=[], cols=[];

const GRAV  = () => H * 1.8;      // px/s²  — pulled downward
const JUMP  = () => -(H * 1.1);   // px/s   — upward burst
const HSPD  = () => W * 0.42;     // px/s   — left/right walk
const OSPD  = () => W * (.28 + level*.08);  // px/s obstacle
const CSPD  = () => W * 0.18;     // px/s collectible

function startGame() {
  ac(); // unlock audio context on user gesture
  score=0; lives=3; level=1;
  spaT=0; colT=0; quoT=0; tckT=0; bgX=0; lastT=0; spaI=2200;
  obs=[]; cols=[];
  resize();
  pl.x=W*.08; pl.y=H-GH-CSZ; pl.vy=0; pl.grnd=true; pl.inv=0;
  pl.goL=false; pl.goR=false;
  updateHUD(); renderLives();

  // hide screens, show game elements
  g('sTitle').classList.remove('show');
  g('sOver').classList.remove('show');
  CV.style.display = 'block';
  g('jumpZone').style.display = 'block';
  g('hud').style.display = 'flex';
  g('ctrl').style.display = 'flex';

  running = true;
  stopBgMusic();
  startBgMusic();
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  cancelAnimationFrame(raf);
  stopBgMusic();
  SFX.over();
  setTimeout(playGoAudio, 500);
  CV.style.display = 'none';
  g('jumpZone').style.display = 'none';
  g('hud').style.display = 'none';
  g('ctrl').style.display = 'none';

  g('goSc').textContent = score;
  if (score > HS) {
    HS = score; localStorage.setItem('modiHS4', HS);
    g('goHS').textContent = '🏆 NEW HIGH SCORE! Ek dum mast!';
    g('goEm').textContent = '🎉';
  } else {
    g('goHS').textContent = 'Best: ' + HS;
    g('goEm').textContent = '😔';
  }
  g('goQ').textContent = OVER_Q[Math.floor(Math.random()*OVER_Q.length)];
  g('sOver').classList.add('show');
}

function goHome() {
  running = false;
  stopBgMusic();
  cancelAnimationFrame(raf);
  CV.style.display = 'none';
  g('jumpZone').style.display = 'none';
  g('hud').style.display = 'none';
  g('ctrl').style.display = 'none';
  g('sOver').classList.remove('show');
  g('sTitle').classList.add('show');

}

/* ═══════════════════════════════════════
   LOOP
═══════════════════════════════════════ */
function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - (lastT||ts)) / 1000, .05);
  lastT = ts;
  update(dt);
  draw();
  raf = requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════
   UPDATE
═══════════════════════════════════════ */
function update(dt) {
  const ms = dt * 1000;
  bgX = (bgX + OSPD() * .3 * dt) % W;

  // horizontal
  if (pl.goL) pl.x = Math.max(0,       pl.x - HSPD()*dt);
  if (pl.goR) pl.x = Math.min(W - CSZ, pl.x + HSPD()*dt);

  // gravity  (vy in px/s, grav in px/s²)
  pl.vy += GRAV()*dt;
  pl.y  += pl.vy*dt;
  const gY = H - GH - CSZ;
  if (pl.y >= gY) { pl.y=gY; pl.vy=0; pl.grnd=true; }

  if (pl.inv > 0) pl.inv -= ms;

  // score trickle
  score += Math.round(dt*level*3);
  tckT += ms;
  if (tckT > 600) { tckT=0; SFX.tick(); }
  updateHUD();

  // level
  const nl = Math.min(7, 1 + Math.floor(score/400));
  if (nl !== level) {
    level = nl; SFX.levelup();
    g('hudLvl').textContent = `Level ${level} ${'⭐'.repeat(Math.min(level,5))}`;
    flashPW(`LEVEL ${level}! 🚀\nAur tez Mitron!`);
  }

  // spawn obstacles
  spaT += ms;
  if (spaT >= spaI) {
    spaT = 0; spaI = Math.max(750, spaI - 12);
    const fly = Math.random() < .22;
    obs.push({
      e: OBS_DATA[Math.floor(Math.random()*OBS_DATA.length)],
      x: W + OSZ,
      y: fly ? H - GH - OSZ - Math.random()*CSZ*1.5 : H - GH - OSZ
    });
  }

  // spawn collectibles
  colT += ms;
  if (colT >= 2200) {
    colT = 0;
    const c = COL_DATA[Math.floor(Math.random()*COL_DATA.length)];
    cols.push({ e:c.e, pts:c.p, x:W+KSZ, y:H-GH-KSZ-Math.random()*CSZ*1.8 });
  }

  // move
  const os = OSPD(), cs = CSPD();
  obs  = obs.filter(o  => { o.x -= os*dt; return o.x > -OSZ*2; });
  cols = cols.filter(c => { c.x -= cs*dt; return c.x > -KSZ*2; });

  // collisions
  if (pl.inv <= 0) {
    const px=pl.x+CSZ*.2, pw=CSZ*.6, py=pl.y+CSZ*.1, ph=CSZ*.8;
    for (let i = obs.length-1; i >= 0; i--) {
      const o = obs[i];
      if (hit(px,py,pw,ph, o.x+OSZ*.12,o.y+OSZ*.12,OSZ*.76,OSZ*.76)) {
        obs.splice(i,1); lives--; renderLives(); SFX.ouch();
        pl.inv = 1500;
        ft('💥',pl.x+CSZ/2,pl.y,'#ff4444');
        if (lives <= 0) { setTimeout(gameOver,350); return; }
      }
    }
    for (let i = cols.length-1; i >= 0; i--) {
      const c = cols[i];
      if (hit(px,py,pw,ph, c.x,c.y,KSZ,KSZ)) {
        cols.splice(i,1);
        const pts = c.pts*level; score += pts; SFX.pick();
        ft('+'+pts+'⭐', c.x+KSZ/2, c.y, '#FFD700');
        updateHUD();
        if (Math.random() < .35) showQ();
      }
    }
  }

  // quotes
  quoT += ms;
  if (quoT > 7500) { quoT=0; showQ(); }
}

function hit(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

   DRAW
═══════════════════════════════════════ */
function draw() {
  cx.clearRect(0,0,W,H);

  // sky
  const sk = cx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,'#4FC3F7'); sk.addColorStop(.52,'#B3E5FC');
  sk.addColorStop(.7,'#A5D6A7'); sk.addColorStop(1,'#2E7D32');
  cx.fillStyle=sk; cx.fillRect(0,0,W,H);

  // sun
  cx.fillStyle='rgba(255,220,50,.85)';
  cx.beginPath(); cx.arc(W*.84,H*.11,Math.min(W,H)*.053,0,Math.PI*2); cx.fill();

  // hills
  [[.08,'rgba(76,175,80,.4)',80,.4],[.06,'rgba(56,142,60,.5)',55,.65]].forEach(([hf,col,fr,sp])=>{
    cx.fillStyle=col; cx.beginPath(); cx.moveTo(0,H-GH);
    for (let x=0;x<=W;x+=18) cx.lineTo(x,H-GH-Math.sin((x+bgX*sp)/fr)*H*hf-H*.018);
    cx.lineTo(W,H-GH); cx.closePath(); cx.fill();
  });

  // ground tiles
  const tw = Math.round(W/14), off = bgX%tw;
  for (let i=0;i<16;i++) {
    const x = i*tw - off;
    cx.fillStyle = i%2===0 ? '#6D4C41':'#5D4037';
    cx.fillRect(x, H-GH, tw, GH);
    cx.fillStyle='#8D6E63';
    cx.fillRect(x, H-GH, tw, Math.round(GH*.1));
  }

  // obstacles — Rahul photo
  obs.forEach(o => {
    cx.save();
    cx.beginPath();
    cx.arc(o.x+OSZ/2, o.y+OSZ/2, OSZ/2, 0, Math.PI*2);
    cx.clip();
    if (rahulImg.complete && rahulImg.naturalWidth) {
      cx.drawImage(rahulImg, o.x, o.y, OSZ, OSZ);
    } else {
      cx.font=OSZ+'px serif'; cx.textBaseline='top'; cx.fillText('💼',o.x,o.y);
    }
    cx.restore();
    // "Opposition!" label
    cx.fillStyle='#fff'; cx.strokeStyle='#c00'; cx.lineWidth=2;
    cx.font=`bold ${Math.round(OSZ*.22)}px sans-serif`; cx.textAlign='center';
    cx.strokeText('Opposition!',o.x+OSZ/2,o.y+OSZ+Math.round(OSZ*.22));
    cx.fillText('Opposition!',o.x+OSZ/2,o.y+OSZ+Math.round(OSZ*.22));
    cx.textAlign='left';
  });
  cols.forEach(c => em(c.e, c.x, c.y + Math.sin(Date.now()/400+c.x*.01)*4, KSZ));

  // shadow
  const al = pl.inv>0 ? (Math.sin(Date.now()/75)*.5+.5) : 1;
  cx.globalAlpha = al*.2;
  cx.fillStyle='#000';
  cx.beginPath();
  cx.ellipse(pl.x+CSZ/2, H-GH+3, CSZ*.32, CSZ*.07, 0,0,Math.PI*2);
  cx.fill();

  // player — Modi photo
  cx.globalAlpha = al;
  if (modiImg.complete && modiImg.naturalWidth) {
    cx.save();
    cx.beginPath();
    cx.arc(pl.x+CSZ/2, pl.y+CSZ/2, CSZ/2, 0, Math.PI*2);
    cx.clip();
    cx.drawImage(modiImg, pl.x, pl.y, CSZ, CSZ);
    cx.restore();
  } else {
    cx.font = CSZ+'px serif'; cx.textBaseline='top'; cx.fillText('🧔',pl.x,pl.y);
  }
  cx.globalAlpha = 1;
}

function em(e,x,y,sz) {
  cx.font = sz+'px serif';
  cx.textBaseline = 'top';
  cx.fillText(e,x,y);
}

/* ═══════════════════════════════════════
   JUMP
═══════════════════════════════════════ */
function doJump() {
  ac();
  if (!pl.grnd || !running) return;
  pl.vy = JUMP();   // negative = upward in canvas coords
  pl.grnd = false;
  SFX.jump();
}

/* ═══════════════════════════════════════
   HUD
═══════════════════════════════════════ */
function updateHUD() { g('hudScore').textContent = score; }
function renderLives() {
  const c = g('hudLives'); c.innerHTML='';
  for (let i=0;i<3;i++) {
    const s = document.createElement('span');
    s.className='lf'+(i>=lives?' dead':'');
    if (modiImg.complete && modiImg.naturalWidth) {
      const canvas2 = document.createElement('canvas');
      canvas2.width=canvas2.height=28;
      const c2=canvas2.getContext('2d');
      c2.beginPath(); c2.arc(14,14,14,0,Math.PI*2); c2.clip();
      c2.drawImage(modiImg,0,0,28,28);
      canvas2.style.cssText='width:24px;height:24px;border-radius:50%;opacity:'+(i>=lives?'0.2':'1')+';margin:0 2px;vertical-align:middle;';
      c.appendChild(canvas2);
    } else { s.textContent='🧔'; c.appendChild(s); }
  }
}

/* ═══════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════ */
function g(id) { return document.getElementById(id); }

function ft(txt,x,y,col) {
  const d=document.createElement('div');
  d.className='fs'; d.textContent=txt;
  d.style.cssText=`left:${x}px;top:${y}px;color:${col}`;
  document.body.appendChild(d); setTimeout(()=>d.remove(),1100);
}
function showQ() {
  const d=document.createElement('div');
  d.className='qb'; d.textContent=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  document.body.appendChild(d); setTimeout(()=>d.remove(),2800);
}
function flashPW(txt) {
  const p=g('pwf'); p.textContent=txt;
  p.style.animation='none'; void p.offsetWidth;
  p.style.animation='pwshow 2s ease forwards';
}

/* ═══════════════════════════════════════
   CONTROLS
═══════════════════════════════════════ */

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') { e.preventDefault(); doJump(); }
  if (e.code==='ArrowLeft'||e.code==='KeyA')  pl.goL=true;
  if (e.code==='ArrowRight'||e.code==='KeyD') pl.goR=true;
});
document.addEventListener('keyup', e => {
  if (e.code==='ArrowLeft'||e.code==='KeyA')  pl.goL=false;
  if (e.code==='ArrowRight'||e.code==='KeyD') pl.goR=false;
});

// ── Jump zone (tap/swipe on game area) ──
const jz = g('jumpZone');
let tzX=0, tzMoved=false;

jz.addEventListener('touchstart', e => {
  e.preventDefault();
  tzX = e.touches[0].clientX; tzMoved=false;
}, {passive:false});

jz.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - tzX;
  if (Math.abs(dx) > 12) tzMoved=true;
  if (dx > 18)       { pl.goR=true;  pl.goL=false; }
  else if (dx < -18) { pl.goL=true;  pl.goR=false; }
  else               { pl.goL=false; pl.goR=false; }
}, {passive:false});

jz.addEventListener('touchend', e => {
  e.preventDefault();
  pl.goL=false; pl.goR=false;
  if (!tzMoved) doJump();
}, {passive:false});

jz.addEventListener('click', doJump);

// ── Mobile control buttons ──
// Use both mousedown and touchstart for maximum compatibility
function addBtn(id, down, up) {
  const el = g(id);
  el.addEventListener('mousedown',  e => { e.preventDefault(); down(); });
  el.addEventListener('touchstart', e => { e.preventDefault(); down(); }, {passive:false});
  if (up) {
    el.addEventListener('mouseup',   e => { e.preventDefault(); up(); });
    el.addEventListener('touchend',  e => { e.preventDefault(); up(); }, {passive:false});
    el.addEventListener('touchcancel',e=>{ e.preventDefault(); up(); }, {passive:false});
  }
}

addBtn('btnJ', doJump, null);
addBtn('btnL', ()=>{ pl.goL=true; pl.goR=false; }, ()=>{ pl.goL=false; });
addBtn('btnR', ()=>{ pl.goR=true; pl.goL=false; }, ()=>{ pl.goR=false; });

// ── Nav buttons ──
g('startBtn').addEventListener('click',   startGame);
g('restartBtn').addEventListener('click', startGame);
g('homeBtn').addEventListener('click',    goHome);

// Also add touchstart for nav buttons (belt and suspenders)
g('startBtn').addEventListener('touchend',   e=>{ e.preventDefault(); startGame(); }, {passive:false});
g('restartBtn').addEventListener('touchend', e=>{ e.preventDefault(); startGame(); }, {passive:false});
g('homeBtn').addEventListener('touchend',    e=>{ e.preventDefault(); goHome(); },    {passive:false});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
resize();
if (HS > 0) { g('hsBox').style.display='inline-block'; g('hsVal').textContent=HS; }
</script>
